name: Keepalive — Supabase

on:
  schedule:
    # Roda a cada 12 horas (meia-noite e meio-dia UTC)
    - cron: "0 0,12 * * *"
  workflow_dispatch: # Permite rodar manualmente se precisar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_URL }}/api/keepalive")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Keepalive retornou $STATUS"
            exit 1
          fi
          echo "✅ Banco ativo"
